    <!-- Cap brim -->
    <polygon points="22,17 40,10 22,3 4,10" fill="#00897b"/>
    <!-- Tassel -->
    <line x1="39" y1="7" x2="44" y2="21" stroke="#ffd54f" stroke-width="2" stroke-linecap="round"/>
    <circle cx="44.5" cy="23" r="2.5" fill="#ffd54f"/>
    <!-- Body/book shape -->
    <path d="M4,20 L22,28 L40,20 L40,36 C40,36 22,44 22,44 C22,44 4,36 4,36 Z" fill="url(#g1)" opacity="0.9"/>
    <line x1="22" y1="28" x2="22" y2="44" stroke="#00695c" stroke-width="1"/>
  </g>
</svg>
