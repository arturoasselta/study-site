<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyLab — Interactive Study Guides</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#1a237e;--primary-light:#3949ab;--accent:#00bfa5;--bg:#f5f5f5;--card:#fff;--text:#212121;--text-light:#757575;--success:#43a047;--error:#e53935;--warning:#ff9800;--border:#e0e0e0;--sidebar-w:280px;--header-h:64px}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
a{color:var(--primary-light);text-decoration:none}
a:hover{text-decoration:underline}

/* HEADER */
.header{position:fixed;top:0;left:0;right:0;height:var(--header-h);background:var(--primary);color:#fff;display:flex;align-items:center;padding:0 24px;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.header h1{font-size:1.4rem;font-weight:700;cursor:pointer}
.header h1 span{color:var(--accent)}
.header-nav{margin-left:auto;display:flex;gap:16px;align-items:center}
.header-nav button{background:none;border:1px solid rgba(255,255,255,.3);color:#fff;padding:6px 16px;border-radius:20px;cursor:pointer;font-size:.85rem;transition:all .2s}
.header-nav button:hover,.header-nav button.active{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.6)}
.menu-btn{display:none;background:none;border:none;color:#fff;font-size:1.5rem;cursor:pointer;margin-right:12px}

/* LAYOUT */
.app{padding-top:var(--header-h)}
.layout{display:flex;min-height:calc(100vh - var(--header-h))}

/* SIDEBAR */
.sidebar{width:var(--sidebar-w);background:var(--card);border-right:1px solid var(--border);position:fixed;top:var(--header-h);bottom:0;overflow-y:auto;padding:16px 0;transition:transform .3s}
.sidebar h3{padding:8px 20px;font-size:.75rem;text-transform:uppercase;letter-spacing:1px;color:var(--text-light)}
.sidebar-item{display:flex;align-items:center;padding:10px 20px;cursor:pointer;transition:all .15s;gap:10px;font-size:.9rem}
.sidebar-item:hover{background:#e8eaf6}
.sidebar-item.active{background:#c5cae9;font-weight:600;color:var(--primary)}
.sidebar-item .progress-dot{width:10px;height:10px;border-radius:50%;border:2px solid var(--border);flex-shrink:0}
.sidebar-item .progress-dot.complete{background:var(--success);border-color:var(--success)}
.sidebar-item .progress-dot.partial{background:var(--warning);border-color:var(--warning)}
.sidebar-item .unit-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* MAIN CONTENT */
.main{margin-left:var(--sidebar-w);flex:1;padding:32px;max-width:900px}

/* HOME VIEW */
.home{margin-left:0;max-width:100%;padding:48px 32px;display:flex;flex-direction:column;align-items:center}
.home h2{font-size:2rem;margin-bottom:8px;color:var(--primary)}
.home .subtitle{color:var(--text-light);margin-bottom:40px;font-size:1.1rem}
.subject-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:24px;width:100%;max-width:800px}
.subject-card{background:var(--card);border-radius:16px;padding:32px;box-shadow:0 4px 12px rgba(0,0,0,.08);cursor:pointer;transition:all .2s;border:2px solid transparent}
.subject-card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,.12);border-color:var(--accent)}
.subject-card .icon{font-size:3rem;margin-bottom:12px}
.subject-card h3{font-size:1.3rem;margin-bottom:8px}
.subject-card p{color:var(--text-light);font-size:.9rem;margin-bottom:16px}
.subject-card .stats{display:flex;gap:16px;font-size:.8rem;color:var(--text-light)}
.subject-card .stats span{display:flex;align-items:center;gap:4px}
.progress-bar{width:100%;height:6px;background:var(--border);border-radius:3px;margin-top:12px;overflow:hidden}
.progress-bar .fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--success));border-radius:3px;transition:width .5s}

/* STUDY CONTENT */
.content-header{margin-bottom:24px;padding-bottom:16px;border-bottom:2px solid var(--border)}
.content-header h2{font-size:1.6rem;color:var(--primary);margin-bottom:4px}
.content-header .breadcrumb{font-size:.85rem;color:var(--text-light)}
.tab-bar{display:flex;gap:4px;margin-bottom:24px}
.tab-btn{padding:10px 24px;border:none;background:var(--border);cursor:pointer;font-size:.9rem;border-radius:8px 8px 0 0;transition:all .15s;font-weight:500}
.tab-btn.active{background:var(--primary);color:#fff}
.tab-btn:hover:not(.active){background:#ccc}

.study-content{background:var(--card);border-radius:12px;padding:32px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:24px}
.study-content h3{color:var(--primary);margin:24px 0 12px;font-size:1.2rem;border-bottom:1px solid var(--border);padding-bottom:6px}
.study-content h3:first-child{margin-top:0}
.study-content ul,.study-content ol{margin:8px 0 16px 20px}
.study-content li{margin-bottom:6px}
.study-content p{margin-bottom:12px}
.study-content .key-term{background:#e8eaf6;padding:2px 8px;border-radius:4px;font-weight:600}
.study-content .formula{background:#f3e5f5;padding:12px 16px;border-radius:8px;font-family:'Courier New',monospace;margin:12px 0;font-size:1rem;border-left:4px solid #9c27b0}
.study-content .tip{background:#e8f5e9;border-left:4px solid var(--success);padding:12px 16px;border-radius:0 8px 8px 0;margin:12px 0}
.study-content .warning{background:#fff3e0;border-left:4px solid var(--warning);padding:12px 16px;border-radius:0 8px 8px 0;margin:12px 0}
.study-content table{width:100%;border-collapse:collapse;margin:12px 0}
.study-content th,.study-content td{border:1px solid var(--border);padding:8px 12px;text-align:left}
.study-content th{background:#e8eaf6;font-weight:600}

/* QUIZ */
.quiz-container{background:var(--card);border-radius:12px;padding:32px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.quiz-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.quiz-header h3{font-size:1.2rem}
.quiz-progress{font-size:.85rem;color:var(--text-light)}
.question-card{margin-bottom:28px;padding-bottom:24px;border-bottom:1px solid var(--border)}
.question-card:last-of-type{border-bottom:none}
.question-num{font-size:.8rem;text-transform:uppercase;letter-spacing:1px;color:var(--text-light);margin-bottom:8px}
.question-text{font-size:1.05rem;font-weight:600;margin-bottom:16px;line-height:1.5}
.options{display:flex;flex-direction:column;gap:8px}
.option-btn{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border:2px solid var(--border);border-radius:10px;cursor:pointer;transition:all .15s;background:var(--card);text-align:left;font-size:.95rem;line-height:1.4}
.option-btn:hover:not(.disabled){border-color:var(--primary-light);background:#e8eaf6}
.option-btn .letter{width:28px;height:28px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
.option-btn.selected{border-color:var(--primary);background:#c5cae9}
.option-btn.selected .letter{background:var(--primary);color:#fff}
.option-btn.correct{border-color:var(--success);background:#e8f5e9}
.option-btn.correct .letter{background:var(--success);color:#fff}
.option-btn.wrong{border-color:var(--error);background:#ffebee}
.option-btn.wrong .letter{background:var(--error);color:#fff}
.option-btn.disabled{cursor:default;opacity:.7}
.option-btn.disabled.correct{opacity:1}
.explanation{margin-top:12px;padding:12px 16px;background:#e3f2fd;border-radius:8px;font-size:.9rem;border-left:4px solid var(--primary-light);display:none}
.explanation.show{display:block}

/* SCORE */
.score-card{text-align:center;padding:32px;background:var(--card);border-radius:12px;box-shadow:0 4px 16px rgba(0,0,0,.1);margin-top:24px}
.score-ring{width:120px;height:120px;margin:0 auto 16px;position:relative}
.score-ring svg{transform:rotate(-90deg)}
.score-ring .score-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.8rem;font-weight:700}
.score-card h3{font-size:1.4rem;margin-bottom:8px}
.score-card p{color:var(--text-light)}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 24px;border:none;border-radius:8px;cursor:pointer;font-size:.95rem;font-weight:600;transition:all .15s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-light)}
.btn-accent{background:var(--accent);color:#fff}
.btn-accent:hover{background:#00a896}
.btn-outline{background:none;border:2px solid var(--primary);color:var(--primary)}
.btn-outline:hover{background:var(--primary);color:#fff}
.btn-group{display:flex;gap:12px;justify-content:center;margin-top:20px;flex-wrap:wrap}

/* NAV ARROWS */
.nav-arrows{display:flex;justify-content:space-between;margin-top:24px}

/* MOBILE */
@media(max-width:768px){
  .menu-btn{display:block}
  .sidebar{transform:translateX(-100%);z-index:99}
  .sidebar.open{transform:translateX(0);box-shadow:4px 0 16px rgba(0,0,0,.2)}
  .main{margin-left:0;padding:20px 16px}
  .home{padding:24px 16px}
  .subject-cards{grid-template-columns:1fr}
  .study-content,.quiz-container{padding:20px}
  .tab-bar{overflow-x:auto}
}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:98}
.overlay.show{display:block}

/* REQUEST MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border-radius:16px;padding:32px;max-width:560px;width:90%;max-height:85vh;overflow-y:auto;box-shadow:0 12px 40px rgba(0,0,0,.25);position:relative}
.modal h2{color:var(--primary);margin-bottom:4px;font-size:1.4rem}
.modal .modal-sub{color:var(--text-light);margin-bottom:24px;font-size:.9rem}
.modal label{display:block;font-weight:600;margin-bottom:6px;font-size:.9rem}
.modal input,.modal textarea{width:100%;padding:10px 14px;border:2px solid var(--border);border-radius:8px;font-size:.95rem;font-family:inherit;transition:border-color .15s}
.modal input:focus,.modal textarea:focus{outline:none;border-color:var(--primary-light)}
.modal textarea{min-height:80px;resize:vertical}
.form-group{margin-bottom:18px}
.form-group .hint{font-size:.8rem;color:var(--text-light);margin-top:4px}
.link-list{display:flex;flex-direction:column;gap:8px}
.link-row{display:flex;gap:8px;align-items:center}
.link-row input{flex:1}
.link-row .remove-link{background:var(--error);color:#fff;border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.add-link-btn{background:none;border:1px dashed var(--primary-light);color:var(--primary-light);padding:8px;border-radius:8px;cursor:pointer;font-size:.85rem;width:100%;margin-top:4px}
.add-link-btn:hover{background:#e8eaf6}
.modal-actions{display:flex;gap:12px;justify-content:flex-end;margin-top:24px}
.modal .close-btn{position:absolute;top:12px;right:16px;background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--text-light);line-height:1}
.modal .close-btn:hover{color:var(--text)}
.success-msg{text-align:center;padding:24px}
.success-msg .icon{font-size:3rem;margin-bottom:12px}
.success-msg h3{color:var(--success);margin-bottom:8px}
.spinner{display:inline-block;width:18px;height:18px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.request-card{background:linear-gradient(135deg,var(--primary),var(--primary-light));border-radius:16px;padding:32px;color:#fff;cursor:pointer;transition:all .2s;border:2px solid transparent;text-align:center}
.request-card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(26,35,126,.3)}
.request-card .icon{font-size:3rem;margin-bottom:12px}
.request-card h3{font-size:1.3rem;margin-bottom:8px}
.request-card p{opacity:.85;font-size:.9rem}

/* AUTH SCREEN */
.auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a237e 0%,#3949ab 50%,#00bfa5 100%);padding:20px}
.auth-card{background:var(--card);border-radius:20px;padding:40px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.auth-card .logo{text-align:center;margin-bottom:24px}
.auth-card .logo h1{font-size:2rem;color:var(--primary)}
.auth-card .logo h1 span{color:var(--accent)}
.auth-card .logo p{color:var(--text-light);font-size:.9rem;margin-top:4px}
.auth-tabs{display:flex;margin-bottom:24px;border-bottom:2px solid var(--border)}
.auth-tab{flex:1;padding:12px;text-align:center;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s;color:var(--text-light)}
.auth-tab.active{color:var(--primary);border-bottom-color:var(--primary)}
.auth-tab:hover:not(.active){color:var(--text)}
.auth-form .form-group{margin-bottom:16px}
.auth-form label{display:block;font-weight:600;margin-bottom:6px;font-size:.85rem}
.auth-form input{width:100%;padding:12px 14px;border:2px solid var(--border);border-radius:10px;font-size:1rem;font-family:inherit;transition:border-color .15s}
.auth-form input:focus{outline:none;border-color:var(--primary-light)}
.auth-form .auth-btn{width:100%;padding:14px;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;transition:all .15s;color:#fff;background:var(--primary)}
.auth-form .auth-btn:hover{background:var(--primary-light)}
.auth-form .auth-btn:disabled{opacity:.6;cursor:not-allowed}
.auth-error{background:#ffebee;color:var(--error);padding:10px 14px;border-radius:8px;font-size:.9rem;margin-bottom:16px;display:none}
.auth-error.show{display:block}
.user-badge{display:flex;align-items:center;gap:8px;color:#fff;font-size:.85rem}
.user-badge .avatar{width:30px;height:30px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem}
.user-badge .logout-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:4px 12px;border-radius:16px;cursor:pointer;font-size:.8rem}
.user-badge .logout-btn:hover{background:rgba(255,255,255,.25)}

/* DOWNLOAD SECTION */
.download-section{background:linear-gradient(135deg,#e8eaf6,#c5cae9);border-radius:12px;padding:24px;margin-bottom:24px;display:flex;align-items:center;gap:20px;border:1px solid #9fa8da}
.download-section .dl-icon{font-size:2.5rem;flex-shrink:0}
.download-section .dl-info h3{color:var(--primary);margin-bottom:4px;font-size:1.1rem}
.download-section .dl-info p{color:var(--text-light);font-size:.85rem;margin-bottom:12px}
.download-section .dl-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;background:var(--primary);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:.9rem;font-weight:600;text-decoration:none;transition:all .15s}
.download-section .dl-btn:hover{background:var(--primary-light);text-decoration:none}
@media(max-width:768px){.download-section{flex-direction:column;text-align:center}}
</style>
</head>
<body>

<!-- Auth Screen (shown when not logged in) -->
<div id="authScreen" class="auth-screen">
  <div class="auth-card">
    <div class="logo">
      <h1>📚 Study<span>Lab</span></h1>
      <p>Interactive study guides with quizzes</p>
    </div>
    <div class="auth-tabs">
      <div class="auth-tab active" id="loginTab" onclick="showAuthTab('login')">Log In</div>
      <div class="auth-tab" id="signupTab" onclick="showAuthTab('signup')">Sign Up</div>
    </div>
    <div class="auth-error" id="authError"></div>
    <!-- Login Form -->
    <div class="auth-form" id="loginForm">
      <div class="form-group">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••">
      </div>
      <button class="auth-btn" id="loginBtn" onclick="doLogin()">Log In</button>
    </div>
    <!-- Signup Form -->
    <div class="auth-form" id="signupForm" style="display:none">
      <div class="form-group">
        <label for="signupName">Name</label>
        <input type="text" id="signupName" placeholder="Your name">
      </div>
      <div class="form-group">
        <label for="signupEmail">Email</label>
        <input type="email" id="signupEmail" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label for="signupPassword">Password</label>
        <input type="password" id="signupPassword" placeholder="At least 6 characters">
      </div>
      <button class="auth-btn" id="signupBtn" onclick="doSignup()">Create Account</button>
    </div>
  </div>
</div>

<header class="header" id="appHeader" style="display:none">
  <button class="menu-btn" onclick="toggleSidebar()">☰</button>
  <h1 onclick="goHome()">📚 Study<span>Lab</span></h1>
  <nav class="header-nav" id="headerNav"></nav>
</header>

<div class="app" id="appContainer" style="display:none">
  <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main" id="main"></main>
  </div>
</div>

<!-- Request New Subject Modal -->
<div class="modal-overlay" id="requestModal">
  <div class="modal" id="requestFormContainer">
    <button class="close-btn" onclick="closeRequestModal()">&times;</button>
    <div id="requestFormContent">
      <h2>📝 Request a New Study Guide</h2>
      <p class="modal-sub">Share your study materials and we'll build an interactive guide with quizzes.</p>
      <div class="form-group">
        <label for="reqName">Your Name</label>
        <input type="text" id="reqName" placeholder="e.g. Alex">
      </div>
      <div class="form-group">
        <label for="reqSubject">Subject / Topic</label>
        <input type="text" id="reqSubject" placeholder="e.g. Biology 101, World History, Algebra 2">
      </div>
      <div class="form-group">
        <label>Google Drive Links</label>
        <div class="hint">Paste link(s) to documents, slides, PDFs, or folders with your study material.</div>
        <div class="link-list" id="linkList">
          <div class="link-row">
            <input type="url" placeholder="https://drive.google.com/..." class="drive-link">
            <button class="remove-link" onclick="removeLink(this)" style="visibility:hidden">&times;</button>
          </div>
        </div>
        <button class="add-link-btn" onclick="addLink()">+ Add another link</button>
      </div>
      <div class="form-group">
        <label for="reqNotes">Additional Notes (optional)</label>
        <textarea id="reqNotes" placeholder="Anything specific you'd like covered? Key chapters, topics to focus on, etc."></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="closeRequestModal()">Cancel</button>
        <button class="btn btn-primary" id="submitRequestBtn" onclick="submitRequest()">🚀 Submit Request</button>
      </div>
    </div>
  </div>
</div>

<script src="history.js"></script>
<script src="precalc.js"></script>
<script>
/* ─── AUTH & STATE ───────────────────────────────── */
const SUBJECTS = [HISTORY_DATA, PRECALC_DATA];
const SUBJECT_KEYS = ['history', 'precalc'];
const SUBJECT_PDFS = {
  history: { file: 'guides/US-History-Study-Guide.pdf', label: 'US History Study Guide' },
  precalc: { file: 'guides/Pre-Calculus-Study-Guide.pdf', label: 'Pre-Calculus Study Guide' }
};

let authToken = localStorage.getItem('studylab_token') || null;
let currentUser = null;

let state = {
  view: 'home',
  subjectIdx: null,
  unitIdx: 0,
  tab: 'study',
  answers: {},
  submitted: {},
  scores: {}
};

/* ─── AUTH FUNCTIONS ─────────────────────────────── */
function showAuthTab(tab) {
  document.getElementById('loginTab').classList.toggle('active', tab === 'login');
  document.getElementById('signupTab').classList.toggle('active', tab === 'signup');
  document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('signupForm').style.display = tab === 'signup' ? 'block' : 'none';
  document.getElementById('authError').classList.remove('show');
}

function showAuthError(msg) {
  const el = document.getElementById('authError');
  el.textContent = msg;
  el.classList.add('show');
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  if (!email || !password) return showAuthError('Please fill in all fields.');
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'Logging in...';
  try {
    const resp = await fetch('/api/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || 'Login failed');
    authToken = data.token;
    currentUser = data.user;
    localStorage.setItem('studylab_token', authToken);
    await loadProgressFromServer();
    enterApp();
  } catch (e) {
    showAuthError(e.message);
  } finally { btn.disabled = false; btn.textContent = 'Log In'; }
}

async function doSignup() {
  const name = document.getElementById('signupName').value.trim();
  const email = document.getElementById('signupEmail').value.trim();
  const password = document.getElementById('signupPassword').value;
  if (!name || !email || !password) return showAuthError('Please fill in all fields.');
  if (password.length < 6) return showAuthError('Password must be at least 6 characters.');
  const btn = document.getElementById('signupBtn');
  btn.disabled = true; btn.textContent = 'Creating account...';
  try {
    const resp = await fetch('/api/signup', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password })
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || 'Signup failed');
    authToken = data.token;
    currentUser = data.user;
    localStorage.setItem('studylab_token', authToken);
    enterApp();
  } catch (e) {
    showAuthError(e.message);
  } finally { btn.disabled = false; btn.textContent = 'Create Account'; }
}

function logout() {
  authToken = null;
  currentUser = null;
  localStorage.removeItem('studylab_token');
  state = { view: 'home', subjectIdx: null, unitIdx: 0, tab: 'study', answers: {}, submitted: {}, scores: {} };
  document.getElementById('authScreen').style.display = 'flex';
  document.getElementById('appHeader').style.display = 'none';
  document.getElementById('appContainer').style.display = 'none';
}

function enterApp() {
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('appHeader').style.display = 'flex';
  document.getElementById('appContainer').style.display = 'block';
  render();
}

async function checkAuth() {
  if (!authToken) return;
  try {
    const resp = await fetch('/api/me', { headers: { 'Authorization': 'Bearer ' + authToken } });
    if (!resp.ok) throw new Error('Token expired');
    const data = await resp.json();
    currentUser = data.user;
    await loadProgressFromServer();
    enterApp();
  } catch {
    logout();
  }
}

/* ─── SERVER PROGRESS SYNC ───────────────────────── */
async function loadProgressFromServer() {
  if (!authToken) return;
  try {
    const resp = await fetch('/api/progress', { headers: { 'Authorization': 'Bearer ' + authToken } });
    if (!resp.ok) return;
    const data = await resp.json();
    // Convert server format to local state
    state.answers = {};
    state.submitted = {};
    state.scores = {};
    for (const [subjectKey, units] of Object.entries(data.progress || {})) {
      const si = SUBJECT_KEYS.indexOf(subjectKey);
      if (si === -1) continue;
      for (const [uiStr, info] of Object.entries(units)) {
        const k = si + '-' + uiStr;
        if (info.completed) {
          state.submitted[k] = true;
          state.scores[k] = { correct: info.score, total: info.total };
          // Reconstruct answers (we just know score, not individual answers — mark as submitted)
        }
      }
    }
  } catch (e) { console.error('Failed to load progress:', e); }
}

async function saveProgressToServer(si, ui) {
  if (!authToken) return;
  const k = key(si, ui);
  const subjectKey = SUBJECT_KEYS[si];
  const sc = state.scores[k];
  if (!sc) return;
  try {
    await fetch('/api/progress', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + authToken },
      body: JSON.stringify({
        subject: subjectKey,
        unitIndex: ui,
        score: sc.correct,
        total: sc.total,
        completed: !!state.submitted[k]
      })
    });
  } catch (e) { console.error('Failed to save progress:', e); }
}

function loadState() {
  // Progress now loaded from server via loadProgressFromServer()
}

function saveState() {
  // Progress now saved to server via saveProgressToServer()
}

/* ─── HELPERS ────────────────────────────────────── */
function key(si, ui) { return si + '-' + ui; }

function getProgress(si) {
  const subj = SUBJECTS[si];
  let done = 0;
  subj.units.forEach((u, ui) => {
    if (state.submitted[key(si, ui)]) done++;
  });
  return { done, total: subj.units.length, pct: Math.round(done / subj.units.length * 100) };
}

function getUnitStatus(si, ui) {
  const k = key(si, ui);
  if (state.submitted[k]) return 'complete';
  if (state.answers[k] && Object.keys(state.answers[k]).length > 0) return 'partial';
  return 'none';
}

/* ─── RENDER ─────────────────────────────────────── */
function render() {
  if (state.view === 'home') renderHome();
  else renderSubject();
}

function renderHome() {
  document.getElementById('sidebar').innerHTML = '';
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
  const homeUserBadge = currentUser ? `<div class="user-badge">
    <div class="avatar">${currentUser.name.charAt(0).toUpperCase()}</div>
    <span>${currentUser.name}</span>
    <button class="logout-btn" onclick="logout()">Log out</button>
  </div>` : '';
  document.getElementById('headerNav').innerHTML = homeUserBadge;
  const main = document.getElementById('main');
  main.className = 'main home';

  let cards = '';
  SUBJECTS.forEach((s, i) => {
    const p = getProgress(i);
    cards += `
      <div class="subject-card" onclick="openSubject(${i})">
        <div class="icon">${s.icon}</div>
        <h3>${s.title}</h3>
        <p>${s.description}</p>
        <div class="stats">
          <span>📖 ${s.units.length} units</span>
          <span>❓ ${s.units.reduce((a,u)=>a+u.questions.length,0)} questions</span>
          <span>✅ ${p.done}/${p.total} complete</span>
        </div>
        <div class="progress-bar"><div class="fill" style="width:${p.pct}%"></div></div>
      </div>`;
  });

  main.innerHTML = `
    <h2>Welcome to StudyLab</h2>
    <p class="subtitle">Interactive study guides with quizzes — master every topic.</p>
    <div class="subject-cards">
      ${cards}
      <div class="request-card" onclick="openRequestModal()">
        <div class="icon">📝</div>
        <h3>Request a New Subject</h3>
        <p>Have study materials? Share Google Drive links and we'll build you an interactive guide!</p>
      </div>
    </div>`;
}

function renderSubject() {
  const si = state.subjectIdx;
  const subj = SUBJECTS[si];
  const ui = state.unitIdx;
  const unit = subj.units[ui];
  const main = document.getElementById('main');
  main.className = 'main';

  // Header nav
  const navBtns = SUBJECTS.map((s, i) =>
    `<button class="${i === si ? 'active' : ''}" onclick="openSubject(${i})">${s.icon} ${s.shortTitle || s.title}</button>`
  ).join('');
  const userBadge = currentUser ? `<div class="user-badge">
    <div class="avatar">${currentUser.name.charAt(0).toUpperCase()}</div>
    <span>${currentUser.name}</span>
    <button class="logout-btn" onclick="logout()">Log out</button>
  </div>` : '';
  document.getElementById('headerNav').innerHTML = navBtns + userBadge;

  // Sidebar
  renderSidebar(si);

  // Tabs + content
  const isStudy = state.tab === 'study';
  let html = `
    <div class="content-header">
      <div class="breadcrumb"><a href="#" onclick="goHome();return false">Home</a> / ${subj.title}</div>
      <h2>${unit.title}</h2>
    </div>
    <div class="tab-bar">
      <button class="tab-btn ${isStudy?'active':''}" onclick="switchTab('study')">📖 Study Guide</button>
      <button class="tab-btn ${!isStudy?'active':''}" onclick="switchTab('quiz')">✏️ Quiz (${unit.questions.length} Qs)</button>
    </div>`;

  if (isStudy) {
    // Download study guide PDF section
    const pdf = SUBJECT_PDFS[SUBJECT_KEYS[si]];
    if (pdf) {
      html += `<div class="download-section">
        <div class="dl-icon">📄</div>
        <div class="dl-info">
          <h3>Download Study Guide PDF</h3>
          <p>Take the complete ${subj.title} study guide offline — great for printing or studying on the go.</p>
          <a class="dl-btn" href="${pdf.file}" download="${pdf.label}.pdf">⬇️ Download ${pdf.label}</a>
        </div>
      </div>`;
    }
    html += `<div class="study-content">${unit.content}</div>`;
    html += `<div style="text-align:center;margin-top:16px">
      <button class="btn btn-accent" onclick="switchTab('quiz')">Ready? Take the Quiz →</button>
    </div>`;
  } else {
    html += renderQuiz(si, ui, unit);
  }

  // Nav arrows
  html += `<div class="nav-arrows">
    ${ui > 0 ? `<button class="btn btn-outline" onclick="navUnit(${ui-1})">← ${subj.units[ui-1].title}</button>` : '<span></span>'}
    ${ui < subj.units.length - 1 ? `<button class="btn btn-outline" onclick="navUnit(${ui+1})">${subj.units[ui+1].title} →</button>` : '<span></span>'}
  </div>`;

  main.innerHTML = html;
}

function renderSidebar(si) {
  const subj = SUBJECTS[si];
  const p = getProgress(si);
  let items = `<h3>${subj.title} — ${p.pct}% Complete</h3>`;
  subj.units.forEach((u, ui) => {
    const status = getUnitStatus(si, ui);
    const dotClass = status === 'complete' ? 'complete' : status === 'partial' ? 'partial' : '';
    items += `
      <div class="sidebar-item ${ui === state.unitIdx ? 'active' : ''}" onclick="navUnit(${ui})">
        <span class="progress-dot ${dotClass}"></span>
        <span class="unit-label">${u.title}</span>
      </div>`;
  });
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = items;
}

function renderQuiz(si, ui, unit) {
  const k = key(si, ui);
  const ans = state.answers[k] || {};
  const done = !!state.submitted[k];

  let html = '<div class="quiz-container">';
  html += `<div class="quiz-header">
    <h3>Quiz — ${unit.title}</h3>
    <span class="quiz-progress">${Object.keys(ans).length}/${unit.questions.length} answered</span>
  </div>`;

  unit.questions.forEach((q, qi) => {
    html += `<div class="question-card">
      <div class="question-num">Question ${qi + 1} of ${unit.questions.length}</div>
      <div class="question-text">${q.q}</div>
      <div class="options">`;

    const letters = ['A','B','C','D'];
    q.options.forEach((opt, oi) => {
      let cls = 'option-btn';
      if (done) {
        cls += ' disabled';
        if (oi === q.answer) cls += ' correct';
        else if (ans[qi] === oi && oi !== q.answer) cls += ' wrong';
      } else {
        if (ans[qi] === oi) cls += ' selected';
      }
      html += `<div class="${cls}" onclick="selectOption(${si},${ui},${qi},${oi})">
        <span class="letter">${letters[oi]}</span>
        <span>${opt}</span>
      </div>`;
    });
    html += '</div>';
    html += `<div class="explanation ${done?'show':''}">${done ? (ans[qi]===q.answer?'✅ Correct! ':'❌ Incorrect. ') + q.explanation : ''}</div>`;
    html += '</div>';
  });

  if (!done) {
    html += `<div style="text-align:center">
      <button class="btn btn-primary" onclick="submitQuiz(${si},${ui})" ${Object.keys(ans).length < unit.questions.length?'disabled style=\"opacity:.5\"':''}>Submit Quiz</button>
    </div>`;
  } else {
    const sc = state.scores[k];
    const pct = Math.round(sc.correct / sc.total * 100);
    const color = pct >= 80 ? 'var(--success)' : pct >= 60 ? 'var(--warning)' : 'var(--error)';
    const circ = 2 * Math.PI * 50;
    const offset = circ - (pct / 100) * circ;
    html += `<div class="score-card">
      <div class="score-ring">
        <svg width="120" height="120"><circle cx="60" cy="60" r="50" fill="none" stroke="var(--border)" stroke-width="10"/>
        <circle cx="60" cy="60" r="50" fill="none" stroke="${color}" stroke-width="10" stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round"/></svg>
        <div class="score-text" style="color:${color}">${pct}%</div>
      </div>
      <h3>${pct >= 80 ? '🎉 Great Job!' : pct >= 60 ? '👍 Good Effort!' : '📚 Keep Studying!'}</h3>
      <p>You got ${sc.correct} out of ${sc.total} correct.</p>
      <div class="btn-group">
        <button class="btn btn-outline" onclick="retakeQuiz(${si},${ui})">🔄 Retake</button>
        <button class="btn btn-primary" onclick="switchTab('study')">📖 Review Guide</button>
        ${ui < SUBJECTS[si].units.length - 1 ? `<button class="btn btn-accent" onclick="navUnit(${ui+1})">Next Unit →</button>` : ''}
      </div>
    </div>`;
  }
  html += '</div>';
  return html;
}

/* ─── ACTIONS ────────────────────────────────────── */
function goHome() {
  state.view = 'home';
  state.subjectIdx = null;
  render();
  window.scrollTo(0, 0);
}

function openSubject(si) {
  state.view = 'subject';
  state.subjectIdx = si;
  state.unitIdx = 0;
  state.tab = 'study';
  render();
  window.scrollTo(0, 0);
}

function navUnit(ui) {
  state.unitIdx = ui;
  state.tab = 'study';
  render();
  window.scrollTo(0, 0);
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

function switchTab(tab) {
  state.tab = tab;
  render();
  document.querySelector('.tab-bar')?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function selectOption(si, ui, qi, oi) {
  const k = key(si, ui);
  if (state.submitted[k]) return;
  if (!state.answers[k]) state.answers[k] = {};
  state.answers[k][qi] = oi;
  saveState();
  render();
}

function submitQuiz(si, ui) {
  const k = key(si, ui);
  const unit = SUBJECTS[si].units[ui];
  const ans = state.answers[k] || {};
  if (Object.keys(ans).length < unit.questions.length) return;
  let correct = 0;
  unit.questions.forEach((q, qi) => {
    if (ans[qi] === q.answer) correct++;
  });
  state.submitted[k] = true;
  state.scores[k] = { correct, total: unit.questions.length };
  saveProgressToServer(si, ui);
  render();
  document.querySelector('.score-card')?.scrollIntoView({ behavior: 'smooth' });
}

function retakeQuiz(si, ui) {
  const k = key(si, ui);
  delete state.answers[k];
  delete state.submitted[k];
  delete state.scores[k];
  // Reset progress on server
  if (authToken) {
    fetch('/api/progress', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + authToken },
      body: JSON.stringify({ subject: SUBJECT_KEYS[si], unitIndex: ui, score: 0, total: 0, completed: false })
    }).catch(() => {});
  }
  render();
  window.scrollTo(0, 0);
}

function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('overlay');
  sb.classList.toggle('open');
  ov.classList.toggle('show');
}
